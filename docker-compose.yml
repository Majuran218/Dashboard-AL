
# docker-compose.yml
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: advanced-edu-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: advanced_education_db
      MYSQL_USER: edu_user
      MYSQL_PASSWORD: Password@123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - edu-network

  backend:
    build: ./backend
    container_name: advanced-edu-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: advanced_education_db
      DB_USER: edu_user
      DB_PASSWORD: edu_password
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    depends_on:
      - mysql
    networks:
      - edu-network
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: advanced-edu-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - edu-network

volumes:
  mysql_data:

networks:
  edu-network:
    driver: bridge 
